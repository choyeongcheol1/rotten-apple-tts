<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>🇵🇭 필리핀 선교 학습 - 세린교회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&family=Lora:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f5f0;
    --card: #ffffff;
    --accent: #c0392b;
    --accent-soft: #e74c3c;
    --accent-bg: #fdf0ef;
    --blue: #2c6fbb;
    --blue-bg: #eef4fb;
    --green: #1e8449;
    --green-bg: #eafaf1;
    --gold: #b7791f;
    --gold-bg: #fefce8;
    --text: #2d2520;
    --text-light: #6b5e57;
    --border: #e8ddd4;
    --shadow: 0 2px 16px rgba(120,80,50,0.08);
    --radius: 14px;
    --player-bg: #1a1210;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 140px;
  }

  /* ===== MAIN TABS (콘텐츠 전환) ===== */
  .main-tabs {
    display: flex;
    background: #1a1210;
  }

  .main-tab {
    flex: 1;
    padding: 13px 8px;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .main-tab.active { color: white; border-bottom-color: var(--accent-soft); background: rgba(255,255,255,0.08); }

  /* ===== HEADER ===== */
  .hero {
    background: linear-gradient(135deg, #c0392b 0%, #922b21 60%, #641e16 100%);
    color: white;
    text-align: center;
    padding: 40px 20px 32px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }

  .hero-icon { font-size: 52px; display: block; margin-bottom: 8px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
  .hero h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 2px; }
  .hero .subtitle { font-family: 'Lora', serif; font-size: 16px; font-weight: 500; opacity: 0.9; font-style: italic; }
  .hero .tagline { margin-top: 10px; font-size: 12px; opacity: 0.7; letter-spacing: 2px; text-transform: uppercase; }

  /* ===== NAV TABS ===== */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .nav::-webkit-scrollbar { display: none; }

  .nav-tab {
    flex: 1;
    min-width: 80px;
    padding: 14px 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-light);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--accent-bg); }

  /* ===== LANGUAGE TOGGLE ===== */
  .lang-toggle {
    display: flex;
    gap: 6px;
    padding: 12px 16px;
    flex-wrap: wrap;
    justify-content: center;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }

  .lang-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .lang-btn.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
  .lang-btn:active { transform: scale(0.95); }

  /* ===== CONTENT ===== */
  .container { max-width: 600px; margin: 0 auto; padding: 0 12px; }

  .section { display: none; padding-top: 12px; animation: fadeIn 0.3s ease; }
  .section.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .section-intro { text-align: center; padding: 16px; margin-bottom: 8px; }
  .section-intro .num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; background: var(--accent); color: white;
    border-radius: 50%; font-weight: 800; font-size: 16px; margin-bottom: 6px;
  }
  .section-intro h2 { font-size: 18px; font-weight: 800; color: var(--accent); }

  /* ===== LINE CARD ===== */
  .line-card {
    background: var(--card);
    border-radius: var(--radius);
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: all 0.3s;
  }

  .line-card.playing-card {
    border-color: var(--accent-soft);
    box-shadow: 0 0 0 2px var(--accent-bg), var(--shadow);
  }

  .line-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .line-num {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 0 0 8px 0;
  }

  /* Play button on each card */
  .card-play-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    margin: 0 12px 0 0;
    padding: 5px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: white;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .card-play-btn:hover { background: var(--accent-bg); border-color: var(--accent); }
  .card-play-btn:active { transform: scale(0.95); }
  .card-play-btn.is-playing { background: var(--accent); color: white; border-color: var(--accent); }

  .line-content { padding: 10px 16px 16px; }

  .lang-row { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; transition: all 0.3s; }
  .lang-row:last-child { margin-bottom: 0; }

  .lang-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
  .lang-text { font-size: 15px; line-height: 1.65; }

  .row-kor { background: var(--accent-bg); }
  .row-kor .lang-label { color: var(--accent); }
  .row-kor .lang-text { color: var(--text); font-weight: 600; }

  .row-fil { background: var(--blue-bg); }
  .row-fil .lang-label { color: var(--blue); }
  .row-fil .lang-text { color: var(--blue); font-family: 'Lora', serif; font-size: 15.5px; font-weight: 500; }

  .row-eng { background: var(--green-bg); }
  .row-eng .lang-label { color: var(--green); }
  .row-eng .lang-text { color: var(--green); font-family: 'Lora', serif; font-style: italic; font-size: 14px; }

  .row-pron { background: var(--gold-bg); }
  .row-pron .lang-label { color: var(--gold); }
  .row-pron .lang-text { color: var(--gold); font-size: 14px; font-weight: 600; }

  .lang-row.hidden { display: none; }

  /* ===== BOTTOM PLAYER ===== */
  .player-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--player-bg);
    color: white;
    z-index: 300;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    padding: 0 0 env(safe-area-inset-bottom);
  }

  .player-progress {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.15);
    cursor: pointer;
  }
  .player-progress-fill {
    height: 100%;
    background: var(--accent-soft);
    width: 0%;
    transition: width 0.3s linear;
  }

  .player-content {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    gap: 12px;
  }

  .player-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .player-btn:active { transform: scale(0.9); }

  .player-btn-sm {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: white;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .player-btn-sm:active { transform: scale(0.9); }

  .player-info {
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }
  .player-title {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-sub {
    font-size: 11px;
    opacity: 0.6;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-time {
    font-size: 11px;
    opacity: 0.5;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  /* ===== NO FILE NOTICE ===== */
  .no-file-notice {
    display: none;
    background: #fff3cd;
    border: 1px solid #ffc107;
    border-radius: 12px;
    padding: 14px 16px;
    margin: 12px;
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
  }

  /* ===== FONT SIZE CONTROL ===== */
  .font-control {
    position: fixed;
    bottom: 80px;
    right: 16px;
    display: flex;
    gap: 4px;
    z-index: 200;
  }

  .font-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    transition: all 0.2s;
  }
  .font-btn:active { transform: scale(0.9); background: var(--accent-bg); }

  /* ===== SPEED CONTROL ===== */
  .speed-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }

  .speed-bar-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-light);
    margin-right: 4px;
  }

  .speed-option {
    padding: 5px 12px;
    border-radius: 16px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-light);
  }
  .speed-option.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
  .speed-option:active { transform: scale(0.95); }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    padding: 30px 20px;
    color: var(--text-light);
    font-size: 12px;
  }
  .footer .church { font-weight: 700; color: var(--accent); }

  /* ===== PLAY ALL SECTION BUTTON ===== */
  .section-play-all {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
  }
  .section-play-all button {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 24px;
    border: 2px solid var(--accent);
    border-radius: 30px;
    background: white;
    color: var(--accent);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .section-play-all button:hover { background: var(--accent); color: white; }
  .section-play-all button:active { transform: scale(0.96); }
  /* ===== VOCABULARY SECTION ===== */
  .vocab-wrap { display: none; max-width: 600px; margin: 0 auto; padding: 0 12px 140px; }
  .vocab-wrap.active { display: block; }

  .vocab-category {
    margin-top: 16px;
    margin-bottom: 8px;
    font-size: 15px;
    font-weight: 800;
    color: var(--accent);
    padding: 8px 14px;
    background: var(--accent-bg);
    border-radius: 10px;
  }

  .vocab-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .vocab-card:active { transform: scale(0.98); }
  .vocab-card.flipped { border-color: var(--accent-soft); background: var(--accent-bg); }

  .vocab-top { display: flex; align-items: center; justify-content: space-between; }

  .vocab-listen-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .vocab-listen-btn:hover { background: var(--blue-bg); border-color: var(--blue); }
  .vocab-listen-btn:active { transform: scale(0.9); }
  .vocab-listen-btn.playing { background: var(--blue); color: white; border-color: var(--blue); }

  .vocab-fil {
    font-family: 'Lora', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--blue);
  }

  .vocab-pron {
    font-size: 13px;
    color: var(--gold);
    margin-top: 2px;
  }

  .vocab-answer {
    display: none;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
  }
  .vocab-card.flipped .vocab-answer { display: block; }

  .vocab-kor {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .vocab-eng {
    font-size: 12px;
    color: var(--green);
    margin-top: 2px;
  }

  .vocab-example {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 4px;
    font-style: italic;
  }

  .vocab-tap-hint {
    text-align: center;
    font-size: 12px;
    color: #bbb;
    margin: 12px 0;
  }

  .vocab-filter {
    display: flex;
    gap: 6px;
    padding: 12px 16px;
    flex-wrap: wrap;
    justify-content: center;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .vocab-filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .vocab-filter-btn.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }

</style>
</head>
<body>

<!-- MAIN TABS -->
<div class="main-tabs">
  <button class="main-tab active" onclick="switchContent(0)">🍎 썩은 사과</button>
  <button class="main-tab" onclick="switchContent(1)">🇵🇭 필리핀 국가</button>
  <button class="main-tab" onclick="showVocab()">📖 단어장</button>
</div>

<!-- HEADER -->
<div class="hero" id="hero">
  <span class="hero-icon">🍎</span>
  <h1 id="heroTitle">썩은 사과</h1>
  <div class="subtitle" id="heroSubtitle">Ang Bulok na Mansanas</div>
  <div class="tagline" id="heroTagline">The Rotten Apple</div>
</div>

<!-- SECTION NAV -->
<div class="nav" id="nav"></div>

<!-- LANGUAGE TOGGLE -->
<div class="lang-toggle" id="langToggle"></div>

<!-- SPEED CONTROL -->
<div class="speed-bar" id="speedBar">
  <span class="speed-bar-label">🔊 속도</span>
  <button class="speed-option" data-speed="0.85" onclick="setSpeed(0.85)">느리게</button>
  <button class="speed-option active" data-speed="1.0" onclick="setSpeed(1.0)">보통</button>
  <button class="speed-option" data-speed="1.3" onclick="setSpeed(1.3)">빠르게</button>
</div>

<!-- NO FILE NOTICE -->
<div class="no-file-notice" id="noFileNotice">
  ⚠️ MP3 파일을 찾을 수 없습니다.<br>
  <b>output_learning_full</b> 폴더의 MP3 파일들을<br>
  이 HTML 파일과 같은 폴더의 <b>mp3/</b> 폴더에 넣어주세요.
</div>

<div class="container" id="content"></div>

<!-- VOCABULARY SECTION -->
<div class="vocab-wrap" id="vocabWrap">
  <div class="vocab-filter" id="vocabFilter"></div>
  <div class="vocab-tap-hint">카드를 탭하면 뜻이 나옵니다</div>
  <div id="vocabCards"></div>
</div>

<!-- FONT SIZE CONTROL -->
<div class="font-control">
  <button class="font-btn" onclick="changeFontSize(-1)">A-</button>
  <button class="font-btn" onclick="changeFontSize(1)">A+</button>
</div>

<div class="footer">
  <span class="church">세린교회</span> · 필리핀 선교 자료<br>
  썩은 사과 전도 메시지 · 필리핀 국가 (한·필·영)
</div>

<!-- BOTTOM PLAYER BAR -->
<div class="player-bar" id="playerBar">
  <div class="player-progress" onclick="seekAudio(event)">
    <div class="player-progress-fill" id="progressFill"></div>
  </div>
  <div class="player-content">
    <button class="player-btn-sm" onclick="playPrev()">⏮</button>
    <button class="player-btn" id="mainPlayBtn" onclick="toggleMainPlay()">▶</button>
    <button class="player-btn-sm" onclick="playNext()">⏭</button>
    <button class="player-btn-sm" onclick="resetPlayback()" title="정지">⏹</button>
    <div class="player-info">
      <div class="player-title" id="playerTitle">재생할 문장을 선택하세요</div>
      <div class="player-sub" id="playerSub">▶ 버튼 또는 섹션 재생 클릭</div>
    </div>
    <div class="player-time" id="playerTime">0:00</div>
  </div>
</div>

<script>
// ===== 콘텐츠 데이터셋 =====
const allContents = [
  {
    id: 'rotten-apple',
    icon: '🍎',
    title: '썩은 사과',
    subtitle: 'Ang Bulok na Mansanas',
    tagline: 'The Rotten Apple',
    mp3Prefix: 'mp3/',
    mp3Pattern: (num, s, l) => `${num}_${s}-${l}_learning.mp3`,
    sections: [
      {
        title: "겉으로 보이는 사과", shortTitle: "겉보기",
        lines: [
          { kor: "탐스럽고 먹음직스러운 사과지요?", fil: "Nakakatakam at masarap ba ang mansanas na ito?", eng: "Is this apple appetizing and delicious?", pron: "나까까따깜 앗 마사랍 바 앙 만사나스 나 이또?" },
          { kor: "이 사과도 당신도 누가 만드셨을까요?", fil: "Sino ang gumawa ng mansanas na ito at ikaw?", eng: "Who made this apple and you?", pron: "시노 앙 구마와 낭 만사나스 나 이또 앗 이까우?" },
          { kor: "예 맞아요, 하나님이에요!", fil: "Oo tama ka. Diyos ito!", eng: "Yes, you're right. It's God!", pron: "오오 따마 까. 디요스 이또!" },

let activeContent = 0;
let data = allContents[0].sections;

function switchContent(idx) {
  activeContent = idx;
  const content = allContents[idx];
  data = content.sections;

  // Update main tabs
  document.querySelectorAll('.main-tab').forEach((t, i) => t.classList.toggle('active', i === idx));

  // Update hero
  document.querySelector('.hero-icon').textContent = content.icon;
  document.getElementById('heroTitle').textContent = content.title;
  document.getElementById('heroSubtitle').textContent = content.subtitle;
  document.getElementById('heroTagline').textContent = content.tagline;

  // Reset state
  activeSection = 0;
  resetPlayback();
  render();
}

// ===== MP3 파일 매핑 =====
function getMp3Path(globalIdx) {
  const content = allContents[activeContent];
  const num = String(globalIdx).padStart(2, '0');
  let count = 0;
  for (let s = 0; s < data.length; s++) {
    for (let l = 0; l < data[s].lines.length; l++) {
      count++;
      if (count === globalIdx) {
        return content.mp3Prefix + content.mp3Pattern(num, s+1, l+1);
      }
    }
  }
  return null;
}

// ===== STATE =====
let activeLangs = { kor: false, fil: true, eng: false, pron: false };
let activeSection = 0;
let baseFontSize = 15;
let currentTrack = 0; // 1-indexed global line number
let isPlaying = false;
let audio = new Audio();
let playMode = 'single'; // 'single' or 'section' or 'all'
let playbackSpeed = 1.0;

function setSpeed(speed) {
  playbackSpeed = speed;
  audio.playbackRate = speed;
  document.querySelectorAll('.speed-option').forEach(btn => {
    btn.classList.toggle('active', parseFloat(btn.getAttribute('data-speed')) === speed);
  });
}

// ===== AUDIO EVENTS =====
audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('playerTime').textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
  }
});

audio.addEventListener('ended', () => {
  if (playMode === 'single') {
    // 단일 재생은 끝나면 멈추되 위치 유지
    isPlaying = false;
    updateMainPlayBtn();
  } else {
    // Auto-advance
    const totalLines = data.reduce((s, sec) => s + sec.lines.length, 0);
    const nextTrack = currentTrack + 1;

    if (playMode === 'section') {
      const currentSection = getSection(currentTrack);
      const nextSection = getSection(nextTrack);
      if (nextTrack <= totalLines && currentSection === nextSection) {
        playTrack(nextTrack);
      } else {
        isPlaying = false;
        updateMainPlayBtn();
      }
    } else if (playMode === 'all') {
      if (nextTrack <= totalLines) {
        playTrack(nextTrack);
      } else {
        isPlaying = false;
        updateMainPlayBtn();
      }
    }
  }
});

audio.addEventListener('error', () => {
  document.getElementById('noFileNotice').style.display = 'block';
  stopPlayback();
});

function getSection(globalIdx) {
  let count = 0;
  for (let s = 0; s < data.length; s++) {
    for (let l = 0; l < data[s].lines.length; l++) {
      count++;
      if (count === globalIdx) return s;
    }
  }
  return -1;
}

function getLineInfo(globalIdx) {
  let count = 0;
  for (let s = 0; s < data.length; s++) {
    for (let l = 0; l < data[s].lines.length; l++) {
      count++;
      if (count === globalIdx) return { section: s, line: l, data: data[s].lines[l] };
    }
  }
  return null;
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ':' + String(s).padStart(2, '0');
}

function playTrack(globalIdx) {
  currentTrack = globalIdx;
  const path = getMp3Path(globalIdx);
  const info = getLineInfo(globalIdx);

  if (!path || !info) return;

  audio.src = path;
  audio.playbackRate = playbackSpeed;
  audio.play().catch(() => {
    document.getElementById('noFileNotice').style.display = 'block';
  });
  isPlaying = true;

  // Navigate to correct section
  const sIdx = info.section;
  if (sIdx !== activeSection) {
    showSection(sIdx);
  }

  // Update UI
  updatePlayerUI(info);
  highlightCard(globalIdx);
  updateMainPlayBtn();
}

function stopPlayback() {
  audio.pause();
  isPlaying = false;
  updateMainPlayBtn();
}

function resetPlayback() {
  audio.pause();
  audio.currentTime = 0;
  isPlaying = false;
  currentTrack = 0;
  clearHighlights();
  updateMainPlayBtn();
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('playerTime').textContent = '0:00';
  document.getElementById('playerTitle').textContent = '재생할 문장을 선택하세요';
  document.getElementById('playerSub').textContent = '▶ 버튼 또는 섹션 재생 클릭';
}

function toggleMainPlay() {
  if (currentTrack > 0) {
    // 현재 트랙이 있으면 일시정지/재개
    if (audio.paused) {
      audio.play();
      isPlaying = true;
    } else {
      audio.pause();
      isPlaying = false;
    }
    updateMainPlayBtn();
  } else {
    // 트랙이 없으면 처음부터 전체 재생
    playMode = 'all';
    playTrack(1);
  }
}

function playPrev() {
  const prev = Math.max(1, (currentTrack || 1) - 1);
  playTrack(prev);
}

function playNext() {
  const totalLines = data.reduce((s, sec) => s + sec.lines.length, 0);
  const next = Math.min(totalLines, (currentTrack || 0) + 1);
  playTrack(next);
}

function seekAudio(e) {
  if (audio.duration) {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  }
}

function updatePlayerUI(info) {
  document.getElementById('playerTitle').textContent = info.data.kor;
  document.getElementById('playerSub').textContent = info.data.fil;
}

function updateMainPlayBtn() {
  const btn = document.getElementById('mainPlayBtn');
  btn.textContent = (isPlaying && !audio.paused) ? '⏸' : '▶';
}

function highlightCard(globalIdx) {
  clearHighlights();
  const card = document.getElementById('card-' + globalIdx);
  if (card) {
    card.classList.add('playing-card');
    const playBtn = card.querySelector('.card-play-btn');
    if (playBtn) playBtn.classList.add('is-playing');
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function clearHighlights() {
  document.querySelectorAll('.playing-card').forEach(el => el.classList.remove('playing-card'));
  document.querySelectorAll('.card-play-btn.is-playing').forEach(el => el.classList.remove('is-playing'));
}

// ===== SECTION / LANG / FONT =====
function showSection(idx) {
  activeSection = idx;
  document.querySelectorAll('.nav-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === idx));
}

function toggleLang(lang) {
  activeLangs[lang] = !activeLangs[lang];
  document.querySelectorAll('.lang-btn').forEach(btn => {
    const l = btn.getAttribute('data-lang');
    btn.classList.toggle('active', activeLangs[l]);
  });
  document.querySelectorAll('.lang-row').forEach(row => {
    const l = row.getAttribute('data-lang');
    row.classList.toggle('hidden', !activeLangs[l]);
  });
}

function changeFontSize(delta) {
  baseFontSize = Math.max(12, Math.min(22, baseFontSize + delta));
  document.querySelectorAll('.lang-text').forEach(el => el.style.fontSize = baseFontSize + 'px');
}

function playSectionAll(sIdx) {
  playMode = 'section';
  let globalIdx = 0;
  for (let s = 0; s < sIdx; s++) globalIdx += data[s].lines.length;
  globalIdx += 1;
  playTrack(globalIdx);
}

let activeVocabCategory = '전체';

function showVocab() {
  // Update main tabs
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.main-tab')[2].classList.add('active');

  // Hide content mode, show vocab
  document.getElementById('content').style.display = 'none';
  document.getElementById('nav').style.display = 'none';
  document.getElementById('langToggle').style.display = 'none';
  document.getElementById('speedBar').style.display = 'none';
  document.getElementById('playerBar').style.display = 'none';
  document.getElementById('vocabWrap').classList.add('active');

  // Update hero
  document.querySelector('.hero-icon').textContent = '📖';
  document.getElementById('heroTitle').textContent = '단어장';
  document.getElementById('heroSubtitle').textContent = 'Talasalitaan';
  document.getElementById('heroTagline').textContent = 'Filipino Vocabulary';

  renderVocabFilter();
  renderVocab();
}

function hideVocab() {
  document.getElementById('content').style.display = '';
  document.getElementById('nav').style.display = '';
  document.getElementById('langToggle').style.display = '';
  document.getElementById('speedBar').style.display = '';
  document.getElementById('playerBar').style.display = '';
  document.getElementById('vocabWrap').classList.remove('active');
}

function renderVocabFilter() {
  const container = document.getElementById('vocabFilter');
  const categories = ['전체', ...Object.keys(vocabData)];
  container.innerHTML = '';
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'vocab-filter-btn' + (cat === activeVocabCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { activeVocabCategory = cat; renderVocabFilter(); renderVocab(); };
    container.appendChild(btn);
  });
}

let vocabAudio = new Audio();

function speakWord(text, btn, e) {
  e.stopPropagation();
  vocabAudio.pause();
  // 파일명: 필리핀어 단어를 소문자+언더스코어로 변환
  const fname = text.replace(/[^a-zA-Z0-9]/g, '_').replace(/^_+|_+$/g, '').toLowerCase();
  vocabAudio.src = 'mp3_vocab/' + fname + '.mp3';
  btn.classList.add('playing');
  vocabAudio.onended = () => btn.classList.remove('playing');
  vocabAudio.onerror = () => {
    btn.classList.remove('playing');
    // MP3 없으면 브라우저 TTS로 대체
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'fil-PH';
    utterance.rate = 0.85;
    speechSynthesis.speak(utterance);
  };
  vocabAudio.play();
}

function renderVocab() {
  const container = document.getElementById('vocabCards');
  container.innerHTML = '';

  const categories = activeVocabCategory === '전체' ? Object.keys(vocabData) : [activeVocabCategory];

  categories.forEach(cat => {
    const catDiv = document.createElement('div');
    catDiv.className = 'vocab-category';
    const count = vocabData[cat].length;
    catDiv.textContent = `${cat} (${count}개)`;
    container.appendChild(catDiv);

    vocabData[cat].forEach(word => {
      const card = document.createElement('div');
      card.className = 'vocab-card';
      card.onclick = () => card.classList.toggle('flipped');
      card.innerHTML = `
        <div class="vocab-top">
          <div>
            <div class="vocab-fil">${word.fil}</div>
            <div class="vocab-pron">(${word.pron})</div>
          </div>
          <button class="vocab-listen-btn" onclick="speakWord('${word.fil.replace(/'/g, "\\'")}', this, event)" title="듣기">🔊</button>
        </div>
        <div class="vocab-answer">
          <div class="vocab-kor">${word.kor}</div>
          <div class="vocab-eng">${word.eng}</div>
          <div class="vocab-example">예문: ${word.ex}</div>
        </div>
      `;
      container.appendChild(card);
    });
  });
}

// Override switchContent to also hide vocab
const origSwitchContent = switchContent;
switchContent = function(idx) {
  hideVocab();
  origSwitchContent(idx);
};

// ===== RENDER =====
function render() {
  // Nav
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  data.forEach((section, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-tab' + (i === 0 ? ' active' : '');
    btn.innerHTML = `${i+1}부<br><small>${section.shortTitle}</small>`;
    btn.onclick = () => showSection(i);
    nav.appendChild(btn);
  });

  // Lang toggle
  const toggleDiv = document.getElementById('langToggle');
  toggleDiv.innerHTML = '';
  [
    { key: 'kor', label: '🇰🇷 한국어' },
    { key: 'fil', label: '🇵🇭 필리핀어' },
    { key: 'eng', label: '🇬🇧 English' },
    { key: 'pron', label: '🔤 발음' }
  ].forEach(lc => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn' + (activeLangs[lc.key] ? ' active' : '');
    btn.setAttribute('data-lang', lc.key);
    btn.textContent = lc.label;
    btn.onclick = () => toggleLang(lc.key);
    toggleDiv.appendChild(btn);
  });

  // Content
  const container = document.getElementById('content');
  container.innerHTML = '';
  let globalNum = 1;

  data.forEach((section, sIdx) => {
    const sDiv = document.createElement('div');
    sDiv.className = 'section' + (sIdx === activeSection ? ' active' : '');

    let html = `
      <div class="section-intro">
        <div class="num">${sIdx + 1}</div>
        <h2>${section.title}</h2>
      </div>
      <div class="section-play-all">
        <button onclick="playSectionAll(${sIdx})">▶ ${sIdx + 1}부 전체 듣기</button>
      </div>
    `;

    section.lines.forEach((line, lIdx) => {
      const gIdx = globalNum;
      const langs = [
        { key: 'kor', label: '한국어', cls: 'row-kor' },
        { key: 'fil', label: 'FILIPINO', cls: 'row-fil' },
        { key: 'eng', label: 'ENGLISH', cls: 'row-eng' },
        { key: 'pron', label: '발음 가이드', cls: 'row-pron' }
      ];

      let rows = '';
      langs.forEach(l => {
        const hidden = activeLangs[l.key] ? '' : ' hidden';
        rows += `
          <div class="lang-row ${l.cls}${hidden}" data-lang="${l.key}">
            <div class="lang-label">${l.label}</div>
            <div class="lang-text">${line[l.key]}</div>
          </div>
        `;
      });

      html += `
        <div class="line-card" id="card-${gIdx}">
          <div class="line-header">
            <span class="line-num">${gIdx}</span>
            <button class="card-play-btn" onclick="playMode='single'; playTrack(${gIdx})">▶ 듣기</button>
          </div>
          <div class="line-content">${rows}</div>
        </div>
      `;
      globalNum++;
    });

    sDiv.innerHTML = html;
    container.appendChild(sDiv);
  });
}

render();
</script>
